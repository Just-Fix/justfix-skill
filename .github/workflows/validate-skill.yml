name: Validate Skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists
        run: test -f SKILL.md

      - name: Check SKILL.md frontmatter
        run: |
          # First 2 lines should be '---' frontmatter delimiter
          head -1 SKILL.md | grep -q '^---$'
          # Frontmatter must contain name + description (case-sensitive, lowercase keys)
          grep -E '^name:' SKILL.md
          grep -E '^description:' SKILL.md

      - name: No em dashes
        run: |
          # Em dashes are a tell of AI-generated content; reject in all repo markdown
          if grep -rn "—" --include='*.md' --include='*.tsx' --include='*.ts' .; then
            echo "::error::Em dashes found. Use en dashes (–) instead."
            exit 1
          fi

      - name: MCP server is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            https://estimator-mcp.justfix.app/mcp \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}')
          if [ "$STATUS" != "200" ]; then
            echo "::warning::JustFix MCP server returned HTTP $STATUS – may be temporarily down"
          fi

      - name: README has install links
        run: |
          for harness in openclaw hermes claude-code cursor codex-cli gemini-cli; do
            grep -q "install/$harness.md" README.md || (echo "Missing install link for $harness"; exit 1)
          done

      - name: License is MIT
        run: grep -q "MIT License" LICENSE
